
name: hirfahome
description: "HirfaHome - Marketplace pour artisans et particuliers au Maroc."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  provider: ^6.1.5+1
  url_launcher: ^6.2.5
  universal_html: ^2.2.0
  image_picker: ^1.1.2
  firebase_storage: ^13.0.6
  google_sign_in: ^6.2.1
  
  # AJOUTS DU CAHIER DES CHARGES (CDC) - GÉOLOCALISATION & NOTIFICATIONS
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  firebase_messaging: 16.1.1
  flutter_local_notifications: ^17.0.0

  # UI / DESIGN SYSTEM
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/HirfaHome.png